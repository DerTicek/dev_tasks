services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - MOCK_CLEARBIT_URL=http://mock-clearbit:3030
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - mock-clearbit

  mock-clearbit:
    image: node:20-alpine
    container_name: mock-clearbit
    restart: unless-stopped
    ports:
      - "3030:3030"
    command: ["node", "/app/mock-clearbit-api.js"]
    volumes:
      - ./mock-clearbit-api.js:/app/mock-clearbit-api.js:ro

volumes:
  n8n_data:
